open_questions:
  - Which productivity measure matters most to the eventual decision-maker?
contradictions:
  - A universal remote-work conclusion conflicts with the narrow population in the cited study.
coverage_gaps:
  - No long-term study or collaborative-role evidence is included in the toy source set.
