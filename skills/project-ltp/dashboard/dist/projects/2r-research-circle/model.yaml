    statement: Preserve local goals, language, context, and group autonomy
    status: inferred
    confidence: high
    evidence: [EVD-10]

  - id: NEED-4
    type: need
    statement: Discover shared structure that enables coordination across groups
    status: inferred
    confidence: high
