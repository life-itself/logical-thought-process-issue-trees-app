    statement: Preserve spontaneous conversation, intuition, accessibility, and personal learning
    status: observed
    confidence: high
    evidence: [EVD-5, EVD-6]

  - id: NEED-2
    type: need
    statement: Preserve logical focus, traceability, cumulative progress, and alignment
    status: observed
    confidence: high
    evidence: [EVD-5, EVD-6]

