project:
  name: Second Renaissance LTP
  analyzed_path: docs/ltp_trees
  analysis_mode: reconciliation
  provisional_goal: G-1

analysis:
  current_constraint: RC-1
  recommended_next_action: ACT-1
  expected_effect: TR-1
  updated_at: "2026-07-23T13:21:38+02:00"

entities:
  - id: G-1
    type: goal
    statement: Co-initiate a conscious transformation toward a wiser, weller, regenerative civilization
    status: provisional
    confidence: high
    evidence: [EVD-1, EVD-2]
    assumptions:
      - "ASM-1 — The supplied documents represent the intended Second Renaissance group rather than only a thought experiment."
    reasoning: The Goal Tree and CRT state this goal explicitly, but no participant confirmation or operating charter was supplied.

  - id: CSF-1
    type: critical_success_factor
    statement: People durably embody wiser views, values, practices, and ways of acting
    status: inferred
    confidence: high
    evidence: [EVD-1, EVD-2]
    reasoning: The documents distinguish durable adoption from attention, activity, or intellectual agreement.

  - id: CSF-2
    type: critical_success_factor
    statement: The group learns and revises strategy through evidence, objections, and constraint review
    status: inferred
    confidence: high
    evidence: [EVD-4, EVD-8, EVD-10]
    reasoning: Governance, learning cadence, and regular constraint review recur across the CRT, FRT, and PRT.

  - id: CSF-3
    type: critical_success_factor
    statement: Proven practices stabilize in pockets and become responsibly transmissible
    status: inferred
    confidence: high
    evidence: [EVD-1, EVD-10, EVD-17]
    reasoning: The supplied theory of change depends on pockets, sangha support, and mature replication.

  - id: NC-1
    type: necessary_condition
    statement: Goal-relevant throughput is operationally defined without reducing transformation to activity counts
    status: provisional
    confidence: high
    evidence: [EVD-2, EVD-4, EVD-9, EVD-11]

  - id: NC-2
    type: necessary_condition
    statement: A transparent path connects first contact to sustained practice and contribution
    status: provisional
    confidence: high
    evidence: [EVD-4, EVD-5, EVD-9, EVD-12]

  - id: NC-3
    type: necessary_condition
    statement: Participants can repeat embodied practices at progressively deeper levels
    status: provisional
    confidence: high
    evidence: [EVD-4, EVD-13]

  - id: NC-4
    type: necessary_condition
    statement: Contributors can develop into facilitators and accountable stewards
    status: provisional
    confidence: high
    evidence: [EVD-4, EVD-10, EVD-14]

  - id: NC-5
    type: necessary_condition
    statement: Dense practice containers receive sangha support and remain outward-facing
    status: provisional
    confidence: high
    evidence: [EVD-4, EVD-10, EVD-15]

  - id: NC-6
    type: necessary_condition
    statement: Strategic maps are governed as living, challengeable, versioned commons
    status: provisional
    confidence: high
    evidence: [EVD-4, EVD-8, EVD-18]

  - id: RC-0
    type: root_cause
    statement: The group has no agreed process for validating and revising its strategic maps
    status: provisional
    confidence: medium
    evidence: [EVD-4, EVD-6, EVD-8]
    assumptions:
      - "ASM-2 — The documents describe current group practice, not merely risks anticipated by their author."
    reasoning: The CRT names this as a candidate root cause and separately asks the group to validate the tree against lived evidence.

  - id: RC-1
    type: root_cause
    statement: The group lacks a reliable architecture that converts interest into practice, contribution, pocket formation, and replication
    status: provisional
    confidence: medium
    evidence: [EVD-4, EVD-5]
    assumptions:
      - "ASM-3 — Awareness and reach are not the current constraint."
      - "ASM-4 — Conversion failures are material causes of low durable adoption."
    reasoning: The CRT labels this the likely constraint, while also acknowledging that actual UDEs and causal arrows require validation.

  - id: RC-2
    type: root_cause
    statement: Throughput is not yet operationally defined and accepted
    status: provisional
    confidence: medium
    evidence: [EVD-4, EVD-11]

  - id: RC-3
    type: root_cause
    statement: The group lacks a disciplined practice-action-learning and constraint-review cadence
    status: provisional
    confidence: medium
    evidence: [EVD-4, EVD-10]

  - id: UDE-1
