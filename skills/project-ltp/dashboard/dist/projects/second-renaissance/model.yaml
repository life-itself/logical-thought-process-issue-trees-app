open_questions:
  - Do actual participants confirm G-1 as the operating goal and the supplied system boundary?
  - Which listed UDEs are observed now, by whom, and with what evidence?
  - Is conversion architecture truly the current constraint, or are governance, facilitator capacity, funding, trust, or another cause tighter?
  - What minimum duration and evidence qualifies an adoption event as durable?
  - Who has authority to accept, dispute, revise, or retire entities and causal links?
  - Which protected floors must no throughput optimization violate?

contradictions:
  - The CRT presents a likely system constraint while also stating that its UDEs and causal arrows have not been validated against lived evidence.
  - The source defines throughput operationally in prose while simultaneously naming the absence of an accepted operational throughput definition as a root cause.
  - The PRT calls governance and model validation first, whereas the CRT working conclusion foregrounds throughput definition and conversion architecture.
  - The source set contains no Transition Tree even though the PRT identifies it as the next required LTP artifact.

coverage_gaps:
  - No participant interviews, meeting records, activity logs, adoption records, or group decisions were supplied.
  - No owners, dates, resource limits, safeguarding policy, or external constraints accompany the proposed injections.
  - The documents reference Second Renaissance whitepapers and a How paper that were not present in docs/ltp_trees.
  - No historical observations support a throughput.yaml; none was created.
  - Five supplied documents were normalized; no separate Transition Tree source existed, so that view is inferred.
