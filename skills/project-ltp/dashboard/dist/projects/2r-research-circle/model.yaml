entities:
  - id: G-1
    type: goal
    statement: 2R inquiry becomes cumulative, plural, and action-guiding through a continually improving shared model
    status: confirmed
    confidence: high
    evidence: [EVD-1, EVD-8]
    assumptions:
      - "ASM-1 — Improving the shared model is the Research Circle's distinctive contribution to 2R."
    reasoning: The prompt explicitly distinguishes research-circle throughput from 2R-wide transformation and records agreement that improving the 2R LTP trees is the research group's throughput.

  - id: CSF-1
    type: critical_success_factor
    statement: Individual research contributions can enter a clear path from expression to model impact
    status: inferred
    confidence: high
    evidence: [EVD-5, EVD-8, EVD-9]

  - id: CSF-2
    type: critical_success_factor
    statement: Model changes receive legitimate, transparent, and reversible dispositions
    status: inferred
    confidence: high
    evidence: [EVD-4, EVD-14]

  - id: CSF-3
    type: critical_success_factor
    statement: The shared model preserves cumulative reasoning, evidence, disagreement, and downstream implications
    status: inferred
    confidence: high
    evidence: [EVD-6, EVD-8]

  - id: CSF-4
    type: critical_success_factor
    statement: Individual and group trees can align across scales without erasing autonomy or difference
    status: inferred
    confidence: high
    evidence: [EVD-10]

  - id: NC-1
    type: necessary_condition
    statement: Conversations, papers, and presentations remain linked to the claims and proposed changes they generate
    status: inferred
    confidence: high
    evidence: [EVD-5, EVD-8]

  - id: NC-2
    type: necessary_condition
    statement: Claims, evidence, assumptions, links, and revisions have stable identities and provenance
    status: inferred
    confidence: high
    evidence: [EVD-4, EVD-14]

  - id: NC-3
    type: necessary_condition
    statement: Standing, stewardship, review criteria, objection handling, and decision authority are explicit
    status: inferred
    confidence: high
    evidence: [EVD-4, EVD-14]

  - id: NC-4
    type: necessary_condition
    statement: Contributors can participate naturally without mastering tree formalism
    status: inferred
    confidence: high
    evidence: [EVD-5]

  - id: NC-5
    type: necessary_condition
    statement: Research effort is judged by model improvement and downstream relevance rather than activity
    status: inferred
    confidence: high
    evidence: [EVD-8]

  - id: NC-6
    type: necessary_condition
    statement: Tree boundaries, scale, shared interfaces, and grafting rules are explicit
    status: inferred
    confidence: high
    evidence: [EVD-10]

  - id: NC-7
    type: necessary_condition
    statement: The group regularly reviews uptake failures, model quality, and the current research constraint
    status: inferred
    confidence: medium
    evidence: [EVD-3, EVD-16]

  - id: RC-1
    type: root_cause
    statement: No legitimate low-friction uptake loop connects research contributions to versioned shared-model changes
    status: inferred
    confidence: high
    evidence: [EVD-4, EVD-5, EVD-8]
    assumptions:
      - "ASM-2 — The Research Circle already generates potentially useful contributions."
      - "ASM-3 — Uptake, not idea generation, is the present constraint."
    reasoning: The prompt reports revision suggestions without a disposition path, seeks a bridge from natural conversation into trees, and defines research throughput as duly improving the trees.

  - id: RC-2
    type: root_cause
    statement: Authority and governance for consequential tree revisions are undefined
    status: observed
    confidence: high
    evidence: [EVD-4]

  - id: RC-3
    type: root_cause
    statement: Contributions have no standard representation as source-linked model change proposals
    status: inferred
    confidence: high
    evidence: [EVD-5, EVD-7]

  - id: RC-4
    type: root_cause
    statement: Platform ideas foreground matching and a master tree before the uptake process and model are mature
    status: observed
    confidence: high
    evidence: [EVD-7]

  - id: RC-5
    type: root_cause
    statement: Individual, group, and everyone-level tree interfaces and grafting semantics are undefined
    status: observed
    confidence: high
    evidence: [EVD-10]

  - id: UDE-1
    type: undesirable_effect
    statement: Revision suggestions and objections have no reliable disposition
    status: observed
    confidence: high
    evidence: [EVD-4]

  - id: UDE-2
    type: undesirable_effect
    statement: Consequential shared trees remain vulnerable to unilateral judgment or a few points of failure
    status: observed
    confidence: high
    evidence: [EVD-4]

  - id: UDE-3
    type: undesirable_effect
    statement: Important discussions can recur without the group's shared vision or commitments changing
    status: inferred
    confidence: medium
    evidence: [EVD-6]

  - id: UDE-4
    type: undesirable_effect
    statement: Contributors appear forced to choose conversational freedom or structured accumulation
    status: inferred
    confidence: high
    evidence: [EVD-5]

  - id: UDE-5
    type: undesirable_effect
    statement: Automated alignment suggestions are not yet poignant or reliable enough to create synergy
    status: observed
    confidence: high
    evidence: [EVD-7]

  - id: UDE-6
    type: undesirable_effect
    statement: Research can be called relevant without producing any durable improvement to the shared model
    status: inferred
    confidence: high
    evidence: [EVD-8]

  - id: UDE-7
    type: undesirable_effect
