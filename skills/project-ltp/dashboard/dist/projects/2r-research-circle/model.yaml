evidence:
  - id: EVD-1
    source: docs/prompts/LTP_BACKGROUND_PROMPT.md
    lines: "5-17"
    observation: The organization adopted LTP trees to pursue tangible progress toward better collective intelligence for the metacrisis.
    interpretation: This establishes the broader purpose but not the Research Circle's distinct goal.
  - id: EVD-2
    source: docs/prompts/LTP_BACKGROUND_PROMPT.md
    lines: "21-23"
    observation: Initial 2R-wide throughput was defined as durable adoption of real transformation.
    interpretation: This is organization-level throughput, not research-circle throughput.
  - id: EVD-3
    source: docs/prompts/LTP_BACKGROUND_PROMPT.md
    lines: "35-49"
    observation: A participant frames 2R as education, R&D, and training that turns information into workable ideas and people into theorists and practitioners.
    interpretation: The Research Circle may serve an educational pipeline, but this does not itself define research throughput.
  - id: EVD-4
    source: docs/prompts/LTP_BACKGROUND_PROMPT.md
    lines: "51-61"
    observation: Revision suggestions lacked an authority and disposition process; the author identified update governance and provisional validation as prior to throughput.
    interpretation: Governance is a directly reported prerequisite and current weakness.
  - id: EVD-5
    source: docs/prompts/LTP_BACKGROUND_PROMPT.md
    lines: "69-69"
    observation: The prompt names a conflict between spontaneous intuitive conversation and tree-enabled focus, clarity, alignment, and cumulative contribution.
    interpretation: A bridge must preserve both needs instead of forcing one participation mode.
  - id: EVD-6
    source: docs/prompts/LTP_BACKGROUND_PROMPT.md
    lines: "83-107"
    observation: The exchange distinguishes personal development from group intellectual progress and defines the latter as increasing coherence of shared vision rather than recurring discussion.
    interpretation: Persistent shared-model change is the relevant research-circle effect.
  - id: EVD-7
    source: docs/prompts/LTP_BACKGROUND_PROMPT.md
    lines: "115-121"
    observation: An early platform assumed one authoritative tree, an empty-dancefloor acquisition problem, and automated matching that was limited by immature trees and weak suggestions.
    interpretation: Interface and matching work may be premature relative to governance and uptake-process validation.
  - id: EVD-8
    source: docs/prompts/LTP_BACKGROUND_PROMPT.md
    lines: "125-167"
    observation: David distinguishes 2R-wide throughput from Research Circle throughput; David and Rufus agree that duly improving the 2R LTP trees is the latter.
    interpretation: This is the strongest direct evidence for G-1 and the research throughput unit.
  - id: EVD-9
    source: docs/prompts/LTP_BACKGROUND_PROMPT.md
    lines: "173-173"
    observation: The prompt concludes that the system should germinate and align individual contributions.
    interpretation: Contribution development and uptake are central workflows.
  - id: EVD-10
    source: docs/prompts/LTP_BACKGROUND_PROMPT.md
    lines: "177-193"
    observation: The prompt proposes individual, group, and everyone scales, rejects treating 2R as inherently top-level, and imagines emergent alignment through tree grafting.
    interpretation: Federation must preserve scale and plurality; the everyone-level model should not be pre-imposed.
  - id: EVD-11
    source: docs/ltp_trees/Goal Tree_ Second Renaissance.md
    lines: "1-24"
    observation: The organization-level Goal Tree aims at a wiser, weller, regenerative civilization through eight success factors.
    interpretation: This is the broader model the Research Circle is meant to improve, not the Research Circle's own Goal Tree.
  - id: EVD-12
    source: docs/ltp_trees/Current Reality Tree_ Second Renaissance.md
    lines: "1-13"
    observation: The pre-existing CRT defines the system as a 2R group and throughput as durable adoption.
    interpretation: It confirms that the supplied trees operate at organization level.
  - id: EVD-13
    source: docs/ltp_trees/Current Reality Tree_ Second Renaissance.md
    lines: "55-81"
    observation: The existing CRT lists map governance, throughput, conversion, practice, containers, and learning rhythm as candidate root causes.
    interpretation: These remain prior hypotheses for 2R proper, not observations about the Research Circle.
  - id: EVD-14
    source: docs/ltp_trees/Future Reality Tree_ Second Renaissance.md
    lines: "17-39"
    observation: The existing FRT proposes version history, change proposals, objection logging, evidence standards, decision rules, minority reports, cadence, and accountable stewards.
    interpretation: These elements directly inform the Research Circle governance injection.
  - id: EVD-15
    source: docs/ltp_trees/Current Reality Tree_ Second Renaissance.md
    lines: "321-346"
    observation: The existing CRT explicitly says its UDEs and causal arrows require validation against lived evidence.
    interpretation: The Research Circle's first useful work can be a governed model-change pilot rather than accepting the trees wholesale.
  - id: EVD-16
    source: docs/ltp_trees/Prerequisite Tree_ Second Renaissance.md
    lines: "452-482"
    observation: The pre-existing dependency chain starts with update governance and provisional validation, then proceeds through throughput and implementation.
    interpretation: A manual uptake loop is prior to platform scaling.

