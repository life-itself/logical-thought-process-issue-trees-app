entities:
  - id: G-1
    type: goal
    statement: Remote-work decisions reflect evidence and context
    status: inferred
    confidence: medium
    evidence: [EVD-1]
    assumptions: [ASM-1]
    reasoning: The source material frames the decision as conditional rather than universal.
  - id: CSF-1
    type: critical_success_factor
    statement: Productivity claims are scoped by worker and task
    status: confirmed
    confidence: high
    evidence: [EVD-2]
  - id: CSF-2
    type: critical_success_factor
    statement: Findings remain traceable to their sources
    status: confirmed
    confidence: high
    evidence: [EVD-1]
  - id: NC-1
    type: necessary_condition
