open_questions:
  - Which Research Circle members and affected 2R constituencies have standing to propose, review, object, approve, or appeal model changes?
  - What kinds of adopted deltas count as improvements rather than mere change?
  - How should model quality, downstream use, and epistemic significance weight the throughput unit?
  - Which current 2R tree version is canonical enough for a pilot, and who owns it?
  - Can a mediated uptake loop preserve conversational flow without feeling extractive or bureaucratic?
  - What evidence would show that uptake, rather than idea generation or attendance, is the actual constraint?
  - What are the minimum semantics for a graft that preserves local identity, disagreement, provenance, and exit?

contradictions:
  - The early platform assumes one authoritative tree while the later vision rejects treating 2R's group tree as the universal top level.
  - The organization-level throughput definition concerns durable cultural adoption, whereas the Research Circle's throughput concerns adopted improvements to the shared model.
  - The prompt values unstructured conversation and tree-based accumulation, but no operational bridge has yet been demonstrated.
  - The platform imagines automated matching even though the prompt says both the trees and matching quality are not mature enough for poignant synergy.

coverage_gaps:
  - No actual Research Circle recordings, transcripts, papers, agendas, attendance records, or accepted tree revisions were supplied.
  - Referenced screenshots and the linked 2R Throughput Google Doc were not present in the repository.
  - No governance charter, canonical tree version, contributor registry, standing rules, or decision log was supplied.
  - No external group's tree was supplied for grafting analysis.
  - The five pre-existing trees describe 2R proper, not the Research Circle; they were treated as prior model context.
  - No real throughput periods exist, so throughput.yaml was not created.
