    type: need
    statement: Keep the conclusion simple enough to act on
    status: inferred
    confidence: medium
  - id: NEED-2
    type: need
    statement: Preserve the conditions and limits in the evidence
    status: observed
    confidence: high
    evidence: [EVD-2]
  - id: OPT-1
    type: option
    statement: Publish one overall productivity conclusion
    status: provisional
    confidence: low
  - id: OPT-2
    type: option
    statement: Delay any conclusion until every context is covered
    status: provisional
    confidence: low
  - id: INJ-1
    type: injection
    statement: Use a stable issue tree and attach each finding to the questions it informs
    status: inferred
    confidence: high
    evidence: [EVD-3]
  - id: DE-1
    type: desirable_effect
    statement: Readers see the 13% gain together with its role and task limits
    status: inferred
    confidence: high
    evidence: [EVD-1, EVD-2]
  - id: DE-2
    type: desirable_effect
    statement: New studies refine the same decision structure instead of restarting the debate
    status: inferred
    confidence: medium
  - id: OBS-1
    type: obstacle
    statement: The current notes do not give findings stable node addresses
    status: observed
    confidence: high
    evidence: [EVD-3]
  - id: IO-1
    type: intermediate_objective
    statement: Establish and validate the stable remote-work question tree
    status: confirmed
    confidence: high
  - id: IO-2
    type: intermediate_objective
    statement: Map the Ctrip findings to the relevant question nodes
    status: confirmed
    confidence: high
  - id: ACT-1
    type: action
    statement: Map the three Ctrip findings to the gold remote-work tree and review the placements
    status: confirmed
    confidence: high
    evidence: [EVD-1, EVD-2, EVD-3]
  - id: TR-1
    type: expected_effect
    statement: Each finding has a visible scope, relation, and source
    status: inferred
    confidence: high

