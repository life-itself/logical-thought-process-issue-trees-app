evidence:
  - id: EVD-1
    source: docs/ltp_trees/Goal Tree_ Second Renaissance.md
    lines: "1-24"
    observation: The document states the Second Renaissance goal and eight critical success factors.
    interpretation: It supplies the intended destination, but not participant confirmation that the hierarchy is necessary and sufficient.
  - id: EVD-2
    source: docs/ltp_trees/Current Reality Tree_ Second Renaissance.md
    lines: "5-13"
    observation: The system is a Second Renaissance group and throughput is defined as durable adoption by people, groups, and institutions.
    interpretation: The analysis boundary and candidate goal unit are explicit.
  - id: EVD-3
    source: docs/ltp_trees/Current Reality Tree_ Second Renaissance.md
    lines: "17-51"
    observation: Fifteen UDEs are listed, including weak practice conversion, organizer overload, fragile pockets, and weak replication.
    interpretation: These are candidate symptoms, not yet lived observations, because the same document calls the CRT provisional.
  - id: EVD-4
    source: docs/ltp_trees/Current Reality Tree_ Second Renaissance.md
    lines: "55-81"
    observation: Six candidate root causes are named, including missing map governance, throughput definition, conversion pathway, embodied practice, dense containers, and learning rhythm.
    interpretation: The wording explicitly treats them as candidates.
  - id: EVD-5
    source: docs/ltp_trees/Current Reality Tree_ Second Renaissance.md
    lines: "291-317"
    observation: The document identifies the likely constraint as a missing conversion architecture from interest through replication.
    interpretation: This is the strongest supplied constraint hypothesis, not a confirmed bottleneck.
  - id: EVD-6
    source: docs/ltp_trees/Current Reality Tree_ Second Renaissance.md
    lines: "321-346"
    observation: The document says a real CRT must test its UDEs, causal arrows, missing causes, and sphere of influence against lived evidence.
    interpretation: Model validation is the earliest unresolved prerequisite.
  - id: EVD-7
    source: docs/ltp_trees/Conflict Resolution_ Second Renaissance.md
    lines: "496-524"
    observation: The core cloud contrasts movement scale and visibility with monastery/laboratory depth and proposes broad invitation around protected practice pockets.
    interpretation: The proposed injection aims to pursue reach through depth rather than trade one for the other.
  - id: EVD-8
    source: docs/ltp_trees/Future Reality Tree_ Second Renaissance.md
    lines: "17-39"
    observation: The first injection is a versioned stewardship protocol with objections, evidence standards, decision rules, stewards, and review cadence.
    interpretation: The model itself is intended to be governed before it directs consequential work.
  - id: EVD-9
    source: docs/ltp_trees/Future Reality Tree_ Second Renaissance.md
    lines: "41-68"
    observation: The FRT proposes an operational throughput definition, staged conversion architecture, and layered participation.
    interpretation: These injections directly target the candidate constraint and an inclusivity/coherence conflict.
  - id: EVD-10
    source: docs/ltp_trees/Future Reality Tree_ Second Renaissance.md
    lines: "72-113"
    observation: The FRT proposes learning cadence, graduated stewardship, dense pockets, a replication library, and monthly constraint review.
    interpretation: The future state depends on a reinforcing operational system, not one standalone program.
  - id: EVD-11
    source: docs/ltp_trees/Future Reality Tree_ Second Renaissance.md
    lines: "522-629"
    observation: The negative-branch analysis identifies reductive metrics, manipulative conversion, status hierarchy, insular pockets, and shallow replication, with trims for each.
    interpretation: These risks must remain coupled to the injections during implementation.
  - id: EVD-12
    source: docs/ltp_trees/Prerequisite Tree_ Second Renaissance.md
    lines: "80-112"
    observation: The entry-level prerequisites require clear, plain-language, transparent, consent-based, exit-friendly pathways.
    interpretation: An entry pathway is only acceptable if it preserves participant agency.
  - id: EVD-13
    source: docs/ltp_trees/Prerequisite Tree_ Second Renaissance.md
    lines: "126-160"
    observation: The practice prerequisites call for recurring practice, progressive depth, and safety standards.
    interpretation: A first-practice step is insufficient without repetition, differentiation, and safeguards.
  - id: EVD-14
    source: docs/ltp_trees/Prerequisite Tree_ Second Renaissance.md
    lines: "173-215"
    observation: Contribution prerequisites include role clarity, graduated stewardship, and responsibility-not-worth norms.
    interpretation: Distributed leadership requires explicit quality and status safeguards.
