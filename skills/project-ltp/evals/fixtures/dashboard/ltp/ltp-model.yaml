evidence:
  - id: EVD-1
    source: claim-tree-annotation.md
    lines: "86-94"
    observation: The Ctrip study reports a 13% productivity gain for remote workers.
    interpretation: Supports a positive effect in the studied setting, not a universal claim.
  - id: EVD-2
    source: claim-tree-annotation.md
    lines: "88-94"
    observation: The gain came from solo call-handling work and was limited to call-centre workers.
    interpretation: Worker and task scope materially constrain the conclusion.
  - id: EVD-3
    source: claim-tree-annotation.md
    lines: "1-24"
    observation: The process defines a stable claim tree to which source fragments are repeatedly mapped.
    interpretation: Stable question addresses allow evidence and qualifications to accumulate.

