  - id: UDE-2
    type: undesirable_effect
    statement: Evidence from call-centre work is easily generalized to unlike roles
    status: observed
    confidence: high
    evidence: [EVD-2]
  - id: RC-1
    type: root_cause
    statement: Findings arrive as isolated claims instead of accumulating against a stable scaffold
    status: inferred
    confidence: high
    evidence: [EVD-3]
    assumptions: [ASM-2]
    reasoning: Without stable addresses, scope limits and complications remain detached from the claim they qualify.
