  - id: INJ-1
    type: injection
    statement: Use a dual-channel uptake loop from natural contribution to proposed model delta to human disposition
    status: inferred
    confidence: high
    evidence: [EVD-5, EVD-8]
    reasoning: Contributors keep their natural mode while a mediated layer makes possible tree changes explicit and reviewable.

  - id: INJ-2
    type: injection
    statement: Federate trees through provenance-preserving grafts, explicit interfaces, and retained disagreement
    status: inferred
    confidence: medium
    evidence: [EVD-10]

  - id: INJ-3
    type: injection
    statement: Establish a bounded stewardship and revision protocol with visible standing and decision rules
    status: inferred
    confidence: high
    evidence: [EVD-4, EVD-14]

  - id: INJ-4
    type: injection
    statement: Represent every contribution as a source-linked proposed model delta with evidence, assumptions, and status
    status: inferred
    confidence: high
    evidence: [EVD-5, EVD-14]

  - id: INJ-5
    type: injection
    statement: Let AI suggest mappings and deltas while contributors and authorized reviewers retain confirmation authority
    status: inferred
    confidence: high
    evidence: [EVD-7]

  - id: INJ-6
    type: injection
    statement: Maintain a versioned contribution ledger and propagate accepted changes to dependent claims and decisions
    status: inferred
    confidence: medium
    evidence: [EVD-6, EVD-8]

